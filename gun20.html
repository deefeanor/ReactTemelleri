<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>React Gün 20</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      body { font-family: Arial; padding: 20px; }
      .done { text-decoration: line-through; color: gray; }
      .stats {
        background: #eee;
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 10px;
      }
      .loading { font-weight: bold; }
      .error { color: red; }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="text/babel">
      // Gün 20
      // Abdullah abi bugün custom hook yazdım ve React.memo kullandım.

      // 🔥 Custom Hook
      function useFetchTasks() {
        const [tasks, setTasks] = React.useState([]);
        const [loading, setLoading] = React.useState(true);
        const [error, setError] = React.useState(null);

        React.useEffect(() => {
          async function fetchData() {
            try {
              const res = await fetch(
                "https://jsonplaceholder.typicode.com/todos?_limit=5"
              );
              if (!res.ok) throw new Error("Hata");

              const data = await res.json();
              setTasks(data);
            } catch (err) {
              setError("Veri alınamadı.");
            } finally {
              setLoading(false);
            }
          }

          fetchData();
        }, []);

        return { tasks, loading, error, setTasks };
      }

      // 🔥 React.memo ile sarmalanmış component
      const TaskItem = React.memo(function TaskItem({ task, onToggle }) {
        console.log("Render edildi:", task.title);

        return (
          <li>
            <span
              className={task.completed ? "done" : ""}
              onClick={() => onToggle(task.id)}
              style={{ cursor: "pointer" }}
            >
              {task.title}
            </span>
          </li>
        );
      });

      function App() {
        const { tasks, loading, error, setTasks } = useFetchTasks();
        const [count, setCount] = React.useState(0);

        // 🔥 useCallback
        const handleToggle = React.useCallback((id) => {
          setTasks(prev =>
            prev.map(task =>
              task.id === id
                ? { ...task, completed: !task.completed }
                : task
            )
          );
        }, [setTasks]);

        // 🔥 useMemo
        const stats = React.useMemo(() => {
          console.log("İstatistik hesaplandı");

          const total = tasks.length;
          const completed = tasks.filter(t => t.completed).length;
          const percent =
            total === 0 ? 0 : Math.round((completed / total) * 100);

          return { total, completed, percent };
        }, [tasks]);

        return (
          <div>
            <h1>React Gün 20</h1>

            {loading && <p className="loading">Yükleniyor...</p>}
            {error && <p className="error">{error}</p>}

            {!loading && !error && (
              <>
                <div className="stats">
                  <p>Toplam: {stats.total}</p>
                  <p>Tamamlanan: {stats.completed}</p>
                  <p>Oran: %{stats.percent}</p>
                </div>

                <button onClick={() => setCount(count + 1)}>
                  Sayaç ({count})
                </button>

                <ul>
                  {tasks.map(task => (
                    <TaskItem
                      key={task.id}
                      task={task}
                      onToggle={handleToggle}
                    />
                  ))}
                </ul>
              </>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
